<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>WordCraft · 背单词</title>

<!-- PWA / iOS app 配置 -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
<meta name="color-scheme" content="dark light" />

<!-- iOS 全屏 / 主屏幕图标 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WordCraft" />
<meta name="format-detection" content="telephone=no" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="apple-touch-icon" sizes="180x180" href="icon.svg" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<style>
  :root {
    --bg: #0f172a;
    --bg-elev: #1e293b;
    --bg-elev-2: #334155;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #22d3ee;
    --accent-2: #67e8f9;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --border: #334155;
    --radius: 14px;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }
  [data-theme="light"] {
    --bg: #f8fafc;
    --bg-elev: #ffffff;
    --bg-elev-2: #f1f5f9;
    --text: #0f172a;
    --text-dim: #64748b;
    --accent: #0891b2;
    --accent-2: #0e7490;
    --border: #cbd5e1;
    --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }
  button, .tab, .deck-card, .icon-btn {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: max(24px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
             max(80px, calc(env(safe-area-inset-bottom) + 60px)) max(16px, env(safe-area-inset-left));
    transition: background 0.3s, color 0.3s;
  }
  .app { width: 100%; max-width: 720px; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-elev);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .tab {
    padding: 8px 14px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: white; }
  .tab:hover:not(.active) { color: var(--text); }
  .icon-btn {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .icon-btn:hover { border-color: var(--accent); }

  .progress-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }
  .progress-bar {
    height: 6px;
    background: var(--bg-elev);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 18px;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    width: 0%;
    transition: width 0.4s;
  }

  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 28px 32px;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    box-shadow: var(--shadow);
    position: relative;
    animation: fadeIn 0.25s;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card.clickable { cursor: pointer; }
  .word {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-align: center;
    word-break: break-word;
  }
  .phonetic { color: var(--text-dim); font-size: 16px; }
  .meaning {
    font-size: 24px;
    color: var(--accent);
    text-align: center;
    font-weight: 600;
    line-height: 1.4;
  }
  .example {
    font-style: italic;
    color: var(--text-dim);
    text-align: center;
    font-size: 14px;
    line-height: 1.6;
    margin-top: 14px;
    max-width: 95%;
  }
  .example-cn { color: var(--text-dim); font-size: 13px; text-align: center; }
  .hint {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.55;
    letter-spacing: 0.5px;
  }
  .badge {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-elev-2);
    padding: 3px 8px;
    border-radius: 10px;
  }
  .play-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .play-btn:hover { background: var(--accent); color: white; }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 11px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s, opacity 0.15s, background 0.15s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-ghost {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); }

  .options {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    width: 100%;
    margin-top: 18px;
  }
  .option {
    padding: 14px 16px;
    background: var(--bg-elev-2);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    text-align: left;
    font-size: 15px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); transform: translateX(2px); }
  .option.correct { background: var(--success); border-color: var(--success); color: white; }
  .option.wrong { background: var(--danger); border-color: var(--danger); color: white; }
  .option:disabled { cursor: default; transform: none; }

  .spelling-input {
    width: 100%;
    padding: 16px;
    background: var(--bg-elev-2);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 22px;
    text-align: center;
    letter-spacing: 6px;
    margin-top: 16px;
    font-family: "Courier New", monospace;
    font-weight: 600;
  }
  .spelling-input:focus { outline: none; border-color: var(--accent); }
  .spelling-input.correct { border-color: var(--success); color: var(--success); }
  .spelling-input.wrong { border-color: var(--danger); color: var(--danger); }
  .letter-hint {
    font-family: "Courier New", monospace;
    letter-spacing: 8px;
    font-size: 20px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 20px;
  }
  .stat {
    background: var(--bg-elev);
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 30px 16px;
    z-index: 100;
    overflow-y: auto;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 520px;
    width: 100%;
    border: 1px solid var(--border);
  }
  .modal h2 { margin-bottom: 16px; font-size: 18px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h3 {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  select, input[type="text"], textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 8px;
    font-family: inherit;
  }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; font-family: "Courier New", monospace; font-size: 12px; }
  label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }

  .completion { text-align: center; padding: 30px 20px; }
  .completion-icon { font-size: 56px; margin-bottom: 16px; }
  .completion h2 { margin-bottom: 8px; font-size: 22px; }
  .completion p { color: var(--text-dim); margin-bottom: 20px; }

  .level-dots {
    display: inline-flex;
    gap: 3px;
    margin-left: 8px;
  }
  .level-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
  }
  .level-dot.on { background: var(--accent); }

  @media (max-width: 480px) {
    .word { font-size: 34px; }
    .meaning { font-size: 20px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .tab { padding: 7px 10px; font-size: 12px; }
    .header { gap: 8px; }
    .logo { font-size: 18px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">📚 WordCraft</div>
      <div class="tabs">
        <button class="tab" data-mode="flashcard">闪卡</button>
        <button class="tab" data-mode="choice">选择</button>
        <button class="tab" data-mode="spelling">拼写</button>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="icon-btn" id="manage-btn" title="词库管理">⚙️</button>
        <button class="icon-btn" id="theme-btn" title="切换主题">🌙</button>
      </div>
    </div>

    <div class="progress-text">
      <span id="progress-text-left">…</span>
      <span id="progress-text-right">…</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    <div id="content"></div>

    <div class="stats" id="stats"></div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2>⚙️ 词库与设置</h2>

      <div class="modal-section">
        <h3>选择词库</h3>
        <select id="deck-select"></select>
      </div>

      <div class="modal-section">
        <h3>添加单词到"我的单词"</h3>
        <label>英文单词 *</label>
        <input type="text" id="add-word" placeholder="e.g. abandon" autocomplete="off" />
        <label>中文释义 *</label>
        <input type="text" id="add-meaning" placeholder="e.g. v. 抛弃,放弃" autocomplete="off" />
        <label>例句(可选)</label>
        <input type="text" id="add-example" placeholder="e.g. He abandoned his car." autocomplete="off" />
        <button class="btn btn-primary" id="add-btn">添加</button>
      </div>

      <div class="modal-section">
        <h3>导入 JSON 词单</h3>
        <textarea id="import-json" rows="4" placeholder='[{"word":"hello","meaning":"int. 你好","example":"Hello, world."}]'></textarea>
        <button class="btn btn-primary" id="import-btn">导入到"我的单词"</button>
      </div>

      <div class="modal-section">
        <h3>数据管理</h3>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-ghost" id="export-btn" style="flex:1; min-width:140px;">导出全部数据</button>
          <button class="btn btn-danger" id="reset-btn" style="flex:1; min-width:140px;">重置学习进度</button>
        </div>
      </div>

      <button class="btn btn-ghost" id="close-modal">关闭</button>
    </div>
  </div>

<script>
// ===== 内置词库 =====
const BUILTIN_DECKS = {
  common: {
    name: "常用基础词 60",
    words: [
      { word:"abandon", phonetic:"/əˈbændən/", meaning:"v. 抛弃,放弃", example:"He abandoned his car in the snowstorm.", exampleCN:"他在暴风雪中弃车而去。" },
      { word:"ability", phonetic:"/əˈbɪləti/", meaning:"n. 能力,才能", example:"She has the ability to solve complex problems.", exampleCN:"她有解决复杂问题的能力。" },
      { word:"absolute", phonetic:"/ˈæbsəluːt/", meaning:"adj. 绝对的,完全的", example:"There is no absolute truth.", exampleCN:"没有绝对的真理。" },
      { word:"accept", phonetic:"/əkˈsept/", meaning:"v. 接受,认可", example:"I accept your apology.", exampleCN:"我接受你的道歉。" },
      { word:"achieve", phonetic:"/əˈtʃiːv/", meaning:"v. 完成,达到", example:"She worked hard to achieve her goals.", exampleCN:"她努力工作以实现目标。" },
      { word:"adjust", phonetic:"/əˈdʒʌst/", meaning:"v. 调整,适应", example:"It takes time to adjust to a new city.", exampleCN:"适应一个新城市需要时间。" },
      { word:"admire", phonetic:"/ədˈmaɪər/", meaning:"v. 钦佩,欣赏", example:"I admire her courage.", exampleCN:"我钦佩她的勇气。" },
      { word:"afford", phonetic:"/əˈfɔːrd/", meaning:"v. 承担得起,提供", example:"I can't afford a new car.", exampleCN:"我买不起新车。" },
      { word:"ancient", phonetic:"/ˈeɪnʃənt/", meaning:"adj. 古代的,古老的", example:"The ancient ruins attract tourists.", exampleCN:"古老的遗迹吸引游客。" },
      { word:"announce", phonetic:"/əˈnaʊns/", meaning:"v. 宣布,通告", example:"They announced their engagement.", exampleCN:"他们宣布了订婚消息。" },
      { word:"appear", phonetic:"/əˈpɪər/", meaning:"v. 出现,显得", example:"A rainbow appeared after the rain.", exampleCN:"雨后出现了彩虹。" },
      { word:"approach", phonetic:"/əˈproʊtʃ/", meaning:"v./n. 接近;方法", example:"We need a new approach to the problem.", exampleCN:"我们需要一种新方法来解决这个问题。" },
      { word:"argue", phonetic:"/ˈɑːrɡjuː/", meaning:"v. 争论,辩论", example:"They argued about politics for hours.", exampleCN:"他们就政治问题争论了几个小时。" },
      { word:"attempt", phonetic:"/əˈtempt/", meaning:"v./n. 尝试,试图", example:"This is his second attempt to pass the test.", exampleCN:"这是他第二次尝试通过考试。" },
      { word:"attitude", phonetic:"/ˈætɪtuːd/", meaning:"n. 态度,看法", example:"Her positive attitude inspires us.", exampleCN:"她积极的态度激励着我们。" },
      { word:"attract", phonetic:"/əˈtrækt/", meaning:"v. 吸引,引起兴趣", example:"Flowers attract bees.", exampleCN:"花朵吸引蜜蜂。" },
      { word:"balance", phonetic:"/ˈbæləns/", meaning:"n./v. 平衡", example:"Try to balance work and life.", exampleCN:"试着平衡工作与生活。" },
      { word:"behavior", phonetic:"/bɪˈheɪvjər/", meaning:"n. 行为,举止", example:"His behavior is unpredictable.", exampleCN:"他的行为难以预测。" },
      { word:"benefit", phonetic:"/ˈbenɪfɪt/", meaning:"n./v. 利益,好处", example:"Exercise benefits your health.", exampleCN:"锻炼对健康有益。" },
      { word:"brilliant", phonetic:"/ˈbrɪljənt/", meaning:"adj. 灿烂的,杰出的", example:"What a brilliant idea!", exampleCN:"多么绝妙的主意!" },
      { word:"capable", phonetic:"/ˈkeɪpəbl/", meaning:"adj. 有能力的,胜任的", example:"She is capable of great things.", exampleCN:"她能成就大事。" },
      { word:"challenge", phonetic:"/ˈtʃælɪndʒ/", meaning:"n./v. 挑战", example:"Learning a language is a challenge.", exampleCN:"学一门语言是个挑战。" },
      { word:"character", phonetic:"/ˈkærəktər/", meaning:"n. 性格,角色", example:"He has a strong character.", exampleCN:"他性格坚强。" },
      { word:"claim", phonetic:"/kleɪm/", meaning:"v. 声称,索赔", example:"He claims to be innocent.", exampleCN:"他声称自己是无辜的。" },
      { word:"comfort", phonetic:"/ˈkʌmfərt/", meaning:"n./v. 舒适,安慰", example:"She tried to comfort the crying child.", exampleCN:"她试图安慰哭泣的孩子。" },
      { word:"complete", phonetic:"/kəmˈpliːt/", meaning:"adj./v. 完整的;完成", example:"Please complete the form.", exampleCN:"请填完这份表格。" },
      { word:"confident", phonetic:"/ˈkɑːnfɪdənt/", meaning:"adj. 自信的", example:"She felt confident about the interview.", exampleCN:"她对面试很有信心。" },
      { word:"consider", phonetic:"/kənˈsɪdər/", meaning:"v. 考虑,认为", example:"Please consider my offer.", exampleCN:"请考虑我的提议。" },
      { word:"contain", phonetic:"/kənˈteɪn/", meaning:"v. 包含,容纳", example:"This drink contains caffeine.", exampleCN:"这种饮料含有咖啡因。" },
      { word:"continue", phonetic:"/kənˈtɪnjuː/", meaning:"v. 继续,延续", example:"Please continue with your story.", exampleCN:"请接着讲你的故事。" },
      { word:"create", phonetic:"/kriˈeɪt/", meaning:"v. 创造,创建", example:"They created a new product.", exampleCN:"他们创造了一款新产品。" },
      { word:"culture", phonetic:"/ˈkʌltʃər/", meaning:"n. 文化", example:"I love learning about other cultures.", exampleCN:"我喜欢了解其他文化。" },
      { word:"decide", phonetic:"/dɪˈsaɪd/", meaning:"v. 决定,决心", example:"I decided to study abroad.", exampleCN:"我决定出国留学。" },
      { word:"decrease", phonetic:"/dɪˈkriːs/", meaning:"v. 减少", example:"Sales decreased last quarter.", exampleCN:"上个季度销售额下降了。" },
      { word:"deliver", phonetic:"/dɪˈlɪvər/", meaning:"v. 递送,发表", example:"The package was delivered yesterday.", exampleCN:"包裹昨天送到了。" },
      { word:"demand", phonetic:"/dɪˈmænd/", meaning:"v./n. 要求,需要", example:"There is high demand for skilled workers.", exampleCN:"熟练工人需求量很大。" },
      { word:"depend", phonetic:"/dɪˈpend/", meaning:"v. 依靠,取决于", example:"It depends on the weather.", exampleCN:"这要看天气情况。" },
      { word:"describe", phonetic:"/dɪˈskraɪb/", meaning:"v. 描述,形容", example:"Can you describe the suspect?", exampleCN:"你能描述一下嫌疑人吗?" },
      { word:"develop", phonetic:"/dɪˈveləp/", meaning:"v. 发展,开发", example:"The company developed a new app.", exampleCN:"公司开发了一款新应用。" },
      { word:"discover", phonetic:"/dɪˈskʌvər/", meaning:"v. 发现", example:"Scientists discovered a new species.", exampleCN:"科学家发现了一个新物种。" },
      { word:"effort", phonetic:"/ˈefərt/", meaning:"n. 努力", example:"Your hard effort will pay off.", exampleCN:"你的努力会有回报。" },
      { word:"emphasize", phonetic:"/ˈemfəsaɪz/", meaning:"v. 强调", example:"He emphasized the importance of safety.", exampleCN:"他强调了安全的重要性。" },

// ===== 状态 =====
const STORAGE_KEY = "wordcraft_state_v1";
const defaultState = {
  currentDeck: "common",
  mode: "flashcard",
  theme: "dark",
  progress: {},
  customDecks: {},
  sessionSize: 20,
};
let state = JSON.parse(JSON.stringify(defaultState));

let session = {
  queue: [],
  index: 0,
  answered: 0,
  isFlipped: false,
};

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      currentDeck: state.currentDeck,
      mode: state.mode,
      theme: state.theme,
      progress: state.progress,
      customDecks: state.customDecks,
      sessionSize: state.sessionSize,
    }));
  } catch (e) { console.warn("save failed", e); }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch (e) { console.warn("load failed", e); }
}

// ===== 词库与进度 =====
function getAllDecks() {
  return { ...BUILTIN_DECKS, ...(state.customDecks || {}) };
}
function getCurrentDeck() {
  const all = getAllDecks();
  return all[state.currentDeck] || BUILTIN_DECKS.common;
}
function getProgress(word) {
  return state.progress[word] || { level: 0, correctCount: 0, wrongCount: 0, lastReviewed: 0 };
}
function updateProgress(word, correct) {
  const p = { ...getProgress(word) };
  if (correct) {
    p.level = Math.min(5, p.level + 1);
    p.correctCount++;
  } else {
    p.level = Math.max(0, p.level - 1);
    p.wrongCount++;
  }
  p.lastReviewed = Date.now();
  state.progress[word] = p;
  saveState();
}

// 构建本轮 queue:level 低的优先,适度混入已掌握的复习
function buildQueue() {
  const deck = getCurrentDeck();
  const ranked = [...deck.words].map(w => ({
    w,
    p: getProgress(w.word),
  }));
  ranked.sort((a, b) => a.p.level - b.p.level);
  // 混入少量随机以打散顺序
  const buckets = { new:[], learning:[], mastered:[] };
  ranked.forEach(x => {
    if (x.p.level === 0) buckets.new.push(x.w);
    else if (x.p.level >= 5) buckets.mastered.push(x.w);
    else buckets.learning.push(x.w);
  });
  shuffle(buckets.new);
  shuffle(buckets.learning);
  shuffle(buckets.mastered);
  // 先学习中 → 新词 → 少量复习
  const masteredReview = buckets.mastered.slice(0, Math.min(3, buckets.mastered.length));
  let pool = [...buckets.learning, ...buckets.new, ...masteredReview];
  if (pool.length === 0) pool = ranked.map(x => x.w);
  return pool.slice(0, Math.max(1, state.sessionSize));
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== 工具 =====
function escapeHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}
function levelDots(level) {
  let html = '<span class="level-dots">';
  for (let i = 0; i < 5; i++) {
    html += `<span class="level-dot ${i < level ? "on" : ""}"></span>`;
  }
  html += "</span>";
  return html;
}
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.85;
    speechSynthesis.speak(u);
  } catch (e) {}
}
window.speak = speak;

// ===== 闪卡模式 =====
function renderFlashcard() {
  const w = session.queue[session.index];
  if (!w) return renderCompletion();
  const p = getProgress(w.word);
  const c = document.getElementById("content");
  c.innerHTML = `
    <div class="card clickable" id="card">
      <div class="badge">${p.level >= 5 ? "✓ 已掌握" : (p.level === 0 ? "新词" : "学习中")} ${levelDots(p.level)}</div>
      ${session.isFlipped ? `
        <div class="meaning">${escapeHTML(w.meaning)}</div>
        ${w.example ? `<div class="example">"${escapeHTML(w.example)}"</div>` : ""}
        ${w.exampleCN ? `<div class="example-cn">${escapeHTML(w.exampleCN)}</div>` : ""}
        <div class="hint">点击翻回 · 空格切换</div>
      ` : `
        <div class="word">${escapeHTML(w.word)}</div>
        ${w.phonetic ? `<div class="phonetic">${escapeHTML(w.phonetic)}</div>` : ""}
        <button class="play-btn" data-action="speak">🔊 发音</button>
        <div class="hint">点击翻面 · 空格切换</div>
      `}
    </div>
    <div class="actions">
      <button class="btn btn-danger" data-action="wrong">不认识 ✕  <span style="opacity:.5; font-size:11px;">[1]</span></button>
      <button class="btn btn-success" data-action="right">认识 ✓  <span style="opacity:.5; font-size:11px;">[2]</span></button>
    </div>
  `;
  document.getElementById("card").addEventListener("click", e => {
    if (e.target.dataset.action === "speak") {
      speak(w.word);
      return;
    }
    session.isFlipped = !session.isFlipped;
    render();
  });
  c.querySelector('[data-action="wrong"]').onclick = () => answerFlashcard(false);
  c.querySelector('[data-action="right"]').onclick = () => answerFlashcard(true);
}
function answerFlashcard(correct) {
  const w = session.queue[session.index];
  updateProgress(w.word, correct);
  session.index++;
  session.answered++;
  session.isFlipped = false;
  render();
}

// ===== 选择题模式 =====
function renderChoice() {
  const w = session.queue[session.index];
  if (!w) return renderCompletion();
  const p = getProgress(w.word);
  const deck = getCurrentDeck();
  const wrongs = deck.words
    .filter(x => x.word !== w.word)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3);
  const options = shuffle([w, ...wrongs]);

  const c = document.getElementById("content");
  c.innerHTML = `
    <div class="card">
      <div class="badge">${levelDots(p.level)}</div>
      <div class="word">${escapeHTML(w.word)}</div>
      ${w.phonetic ? `<div class="phonetic">${escapeHTML(w.phonetic)}</div>` : ""}
      <button class="play-btn" id="speak-btn">🔊 发音</button>
      <div class="options">
        ${options.map((opt, i) => `
          <button class="option" data-correct="${opt.word === w.word}" data-key="${i + 1}">
            <span style="opacity:.5; margin-right:6px;">${i + 1}.</span>${escapeHTML(opt.meaning)}
          </button>
        `).join("")}
      </div>
      <div class="hint">按 1 / 2 / 3 / 4 选答案</div>
    </div>
  `;
  document.getElementById("speak-btn").onclick = () => speak(w.word);
  c.querySelectorAll(".option").forEach(btn => {
    btn.onclick = () => answerChoice(btn);
  });
}
function answerChoice(btn) {
  const w = session.queue[session.index];
  const correct = btn.dataset.correct === "true";
  document.querySelectorAll(".option").forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === "true") b.classList.add("correct");
  });
  if (!correct) btn.classList.add("wrong");
  updateProgress(w.word, correct);
  setTimeout(() => {
    session.index++;
    session.answered++;
    render();
  }, correct ? 700 : 1300);
}

// ===== 拼写模式 =====
function renderSpelling() {
  const w = session.queue[session.index];
  if (!w) return renderCompletion();
  const p = getProgress(w.word);
  const c = document.getElementById("content");
  const hintArr = w.word.split("").map((ch, i) => (i === 0 ? ch : "_"));
  const hintText = hintArr.join(" ");

  c.innerHTML = `
    <div class="card">
      <div class="badge">${levelDots(p.level)}</div>
      <div class="meaning">${escapeHTML(w.meaning)}</div>
      ${w.phonetic ? `<div class="phonetic">${escapeHTML(w.phonetic)}</div>` : ""}
      <button class="play-btn" id="speak-btn">🔊 听发音</button>
      <div class="letter-hint">${hintText}</div>
      <input class="spelling-input" id="spelling-input" autocomplete="off"
             autocapitalize="off" autocorrect="off" spellcheck="false" />
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="skip-btn">跳过 / 显示答案</button>
      <button class="btn btn-primary" id="check-btn">确认 [Enter]</button>
    </div>
  `;
  document.getElementById("speak-btn").onclick = () => speak(w.word);
  document.getElementById("check-btn").onclick = checkSpelling;
  document.getElementById("skip-btn").onclick = skipSpelling;

  const input = document.getElementById("spelling-input");
  setTimeout(() => input.focus(), 50);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") checkSpelling();
  });
  speak(w.word);
}
function checkSpelling() {
  const input = document.getElementById("spelling-input");
  if (!input) return;
  const w = session.queue[session.index];
  const correct = input.value.trim().toLowerCase() === w.word.toLowerCase();
  input.classList.add(correct ? "correct" : "wrong");
  if (!correct) input.value = w.word;
  updateProgress(w.word, correct);
  setTimeout(() => {
    session.index++;
    session.answered++;
    render();
  }, correct ? 700 : 1300);
}
function skipSpelling() {
  const input = document.getElementById("spelling-input");
  if (!input) return;
  const w = session.queue[session.index];
  input.value = w.word;
  input.classList.add("wrong");
  updateProgress(w.word, false);
  setTimeout(() => {
    session.index++;
    session.answered++;
    render();
  }, 1500);
}

// ===== 完成 =====
function renderCompletion() {
  const c = document.getElementById("content");
  const deck = getCurrentDeck();
  let mastered = 0;
  deck.words.forEach(w => {
    if (getProgress(w.word).level >= 5) mastered++;
  });
  const pct = Math.round((mastered / deck.words.length) * 100);
  c.innerHTML = `
    <div class="card completion">
      <div class="completion-icon">🎉</div>
      <h2>本轮完成!</h2>
      <p>你刚刚练习了 <strong>${session.answered}</strong> 个单词<br/>
         当前词库掌握度: <strong style="color:var(--accent)">${pct}%</strong> (${mastered}/${deck.words.length})</p>
      <div style="display:flex; gap:10px; width:100%; max-width:300px;">
        <button class="btn btn-primary" onclick="startSession()">再来一轮</button>
      </div>
    </div>
  `;
}

// ===== 统计 / 进度条 =====
function renderStats() {
  const deck = getCurrentDeck();
  let news = 0, learning = 0, mastered = 0;
  const total = deck.words.length;
  deck.words.forEach(w => {
    const p = getProgress(w.word);
    if (p.level === 0) news++;
    else if (p.level >= 5) mastered++;
    else learning++;
  });
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">总词数</div></div>
    <div class="stat"><div class="stat-num">${news}</div><div class="stat-label">未学</div></div>
    <div class="stat"><div class="stat-num">${learning}</div><div class="stat-label">学习中</div></div>
    <div class="stat"><div class="stat-num">${mastered}</div><div class="stat-label">已掌握</div></div>
  `;
}
function renderProgress() {
  const total = session.queue.length;
  const done = session.answered;
  const pct = total === 0 ? 0 : (done / total) * 100;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text-left").textContent =
    `本轮进度: ${done}/${total}`;
  const modeMap = { flashcard:"闪卡", choice:"选择", spelling:"拼写" };
  document.getElementById("progress-text-right").textContent =
    `${modeMap[state.mode]} · ${getCurrentDeck().name}`;
}

function render() {
  renderProgress();
  renderStats();
  if (session.index >= session.queue.length) {
    renderCompletion();
    return;
  }
  switch (state.mode) {
    case "flashcard": renderFlashcard(); break;
    case "choice": renderChoice(); break;
    case "spelling": renderSpelling(); break;
  }
}

function startSession() {
  session.queue = buildQueue();
  session.index = 0;
  session.answered = 0;
  session.isFlipped = false;
  render();
}
window.startSession = startSession;

// ===== Tabs =====
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    state.mode = t.dataset.mode;
    saveState();
    startSession();
  });
});

// ===== Theme =====
function applyTheme() {
  document.documentElement.setAttribute("data-theme", state.theme);
  document.getElementById("theme-btn").textContent = state.theme === "dark" ? "🌙" : "☀️";
}
document.getElementById("theme-btn").addEventListener("click", () => {
  state.theme = state.theme === "dark" ? "light" : "dark";
  applyTheme();
  saveState();
});

// ===== Modal =====
const modal = document.getElementById("modal-backdrop");
function openModal() {
  const sel = document.getElementById("deck-select");
  sel.innerHTML = "";
  const all = getAllDecks();
  Object.entries(all).forEach(([k, v]) => {
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = `${v.name} (${v.words.length})`;
    if (k === state.currentDeck) opt.selected = true;
    sel.appendChild(opt);
  });
  modal.classList.add("show");
}
document.getElementById("manage-btn").addEventListener("click", openModal);
document.getElementById("close-modal").addEventListener("click", () => modal.classList.remove("show"));
modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("show"); });

document.getElementById("deck-select").addEventListener("change", e => {
  state.currentDeck = e.target.value;
  saveState();
  startSession();
});

document.getElementById("add-btn").addEventListener("click", () => {
  const word = document.getElementById("add-word").value.trim();
  const meaning = document.getElementById("add-meaning").value.trim();
  const example = document.getElementById("add-example").value.trim();
  if (!word || !meaning) {
    alert("英文单词和中文释义都不能为空");
    return;
  }
  if (!state.customDecks.my) state.customDecks.my = { name: "我的单词", words: [] };
  state.customDecks.my.words.push({ word, meaning, example });
  saveState();
  alert(`已添加 "${word}" 到"我的单词"词库`);
  document.getElementById("add-word").value = "";
  document.getElementById("add-meaning").value = "";
  document.getElementById("add-example").value = "";
});

document.getElementById("import-btn").addEventListener("click", () => {
  const raw = document.getElementById("import-json").value.trim();
  if (!raw) return;
  try {
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) throw new Error("需要 JSON 数组");
    const cleaned = arr.filter(x => x && x.word && x.meaning);
    if (cleaned.length === 0) throw new Error("没有有效条目(需要 word + meaning 字段)");
    if (!state.customDecks.my) state.customDecks.my = { name: "我的单词", words: [] };
    state.customDecks.my.words.push(...cleaned);
    saveState();
    alert(`已导入 ${cleaned.length} 个单词到"我的单词"`);
    document.getElementById("import-json").value = "";
  } catch (e) {
    alert("解析失败: " + e.message);
  }
});

document.getElementById("export-btn").addEventListener("click", () => {
  const data = JSON.stringify({
    progress: state.progress,
    customDecks: state.customDecks,
    exportedAt: new Date().toISOString(),
  }, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `wordcraft-backup-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("reset-btn").addEventListener("click", () => {
  if (confirm("确认重置全部学习进度?(自定义词库会保留)")) {
    state.progress = {};
    saveState();
    startSession();
    modal.classList.remove("show");
  }
});

// ===== Keyboard =====
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (modal.classList.contains("show")) return;

  if (state.mode === "flashcard") {
    if (e.code === "Space") {
      e.preventDefault();
      session.isFlipped = !session.isFlipped;
      render();
    } else if (e.key === "1") {
      answerFlashcard(false);
    } else if (e.key === "2") {
      answerFlashcard(true);
    }
  } else if (state.mode === "choice") {
    const k = parseInt(e.key, 10);
    if (k >= 1 && k <= 4) {
      const btn = document.querySelectorAll(".option")[k - 1];
      if (btn && !btn.disabled) btn.click();
    }
  }
});

// ===== Init =====
loadState();
applyTheme();
document.querySelectorAll(".tab").forEach(t => {
  t.classList.toggle("active", t.dataset.mode === state.mode);
});
startSession();

// ===== PWA Service Worker 注册(离线缓存) =====
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => {
      console.warn("Service Worker 注册失败:", err);
    });
  });
}
</script>
</body>
</html>
